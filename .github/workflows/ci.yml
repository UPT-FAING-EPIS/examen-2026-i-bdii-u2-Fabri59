name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build backend
        run: dotnet build Ticketing.sln --configuration Release
      - name: Test backend
        run: dotnet test Ticketing.sln --configuration Release --no-build
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/ticketing-web/package-lock.json
      - name: Install frontend dependencies
        working-directory: web/ticketing-web
        run: npm install
      - name: Build frontend
        working-directory: web/ticketing-web
        run: npm run build
