name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/ticketing-web/**'
      - 'src/**'
      - '.github/workflows/deploy.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      WEBAPP_NAME: ${{ format('{0}-web', github.event.repository.name) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: web/ticketing-web
        run: npm install

      - name: Build frontend
        working-directory: web/ticketing-web
        run: npm run build

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: web/ticketing-web/dist
