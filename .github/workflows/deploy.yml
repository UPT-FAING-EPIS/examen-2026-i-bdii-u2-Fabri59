name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'web/ticketing-web/**'
      - 'src/**'
      - '.github/workflows/deploy.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      WEBAPP_NAME: ${{ format('{0}-web', github.event.repository.name) }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: web/ticketing-web
        run: npm install

      - name: Build frontend
        working-directory: web/ticketing-web
        run: npm run build

      - name: Package frontend
        working-directory: web/ticketing-web/dist
        run: zip -r ../frontend.zip .

      - name: Resolve resource group
        run: |
          AZURE_RESOURCE_GROUP=$(az webapp list --query "[?name=='$WEBAPP_NAME'] | [0].resourceGroup" -o tsv)
          if [ -z "$AZURE_RESOURCE_GROUP" ]; then
            echo "Web App '$WEBAPP_NAME' not found in the current Azure subscription."
            exit 1
          fi
          echo "AZURE_RESOURCE_GROUP=$AZURE_RESOURCE_GROUP" >> "$GITHUB_ENV"

      - name: Deploy frontend to Azure Web App
        run: az webapp deploy --resource-group "$AZURE_RESOURCE_GROUP" --name "$WEBAPP_NAME" --src-path web/ticketing-web/frontend.zip --type zip
