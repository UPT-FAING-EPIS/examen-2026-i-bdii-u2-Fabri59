name: docs

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tools/**'
      - '.github/workflows/docs.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Generate database docs and diagram
        run: dotnet run --project tools/Ticketing.SchemaExporter -- docs/database
